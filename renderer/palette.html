<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Command Palette</title>
    <script>
      const theme = localStorage.getItem('theme');
      if (theme === 'light' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: light)').matches)) {
        document.documentElement.classList.add('light');
      } else {
        document.documentElement.classList.add('dark');
      }
    </script>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: transparent; overflow: hidden; }
      * { scrollbar-width: thin; scrollbar-color: #3a3c4a transparent; }
      *::-webkit-scrollbar { width: 4px; }
      *::-webkit-scrollbar-track { background: transparent; }
      *::-webkit-scrollbar-button { display: none; height: 0; }
      *::-webkit-scrollbar-thumb { background: #3a3c4a; border-radius: 2px; }
      *::-webkit-scrollbar-thumb:hover { background: #5a5c6a; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/palette.tsx"></script>
  </body>
</html>
