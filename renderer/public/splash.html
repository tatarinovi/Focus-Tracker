<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Tracker</title>
    <script>
      const theme = localStorage.getItem('theme');
      if (theme === 'light' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: light)').matches)) {
        document.documentElement.classList.add('light');
      }
    </script>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --bg: #13151f;
        --text: #f0f2f8;
        --text-sub: #8b90a5;
        --text-status: #9ca1b5;
        --blob-1: rgba(124, 58, 237, 0.18);
        --blob-2: rgba(96, 165, 250, 0.14);
        --bar-track: rgba(255, 255, 255, 0.08);
        --icon-bg: #1c1f2e;
      }

      html.light {
        color-scheme: light;
        --bg: #f4f5f9;
        --text: #1a1d2e;
        --text-sub: #6b7085;
        --text-status: #6b7085;
        --blob-1: rgba(124, 58, 237, 0.10);
        --blob-2: rgba(96, 165, 250, 0.10);
        --bar-track: rgba(0, 0, 0, 0.06);
        --icon-bg: #ffffff;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        overflow: hidden;
        position: relative;
      }

      .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(60px);
        pointer-events: none;
      }

      .blob-1 {
        width: 340px;
        height: 340px;
        background: var(--blob-1);
        top: -80px;
        left: -60px;
      }

      .blob-2 {
        width: 280px;
        height: 280px;
        background: var(--blob-2);
        bottom: -60px;
        right: -40px;
      }

      .content {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 20px;
      }

      .icon-wrap {
        width: 110px;
        height: 110px;
        border-radius: 24px;
        background: var(--icon-bg);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      }

      html.light .icon-wrap {
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      }

      .icon-wrap img {
        width: 80px;
        height: 80px;
        display: block;
      }

      h1 {
        font-size: 28px;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.02em;
      }

      .subtitle {
        font-size: 14px;
        color: var(--text-sub);
        margin-top: -12px;
      }

      .progress-area {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        width: 280px;
      }

      .bar {
        width: 100%;
        height: 6px;
        border-radius: 999px;
        background: var(--bar-track);
        overflow: hidden;
      }

      .fill {
        height: 100%;
        width: 12%;
        min-width: 12%;
        border-radius: inherit;
        background: linear-gradient(90deg, #7c3aed, #60a5fa);
        transition: width 180ms ease;
      }

      .bar.indeterminate .fill {
        width: 35%;
        min-width: 35%;
        animation: indeterminate 1.2s ease-in-out infinite;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--text-status);
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #facc15;
        flex-shrink: 0;
      }

      .actions {
        display: none;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 9px 14px;
        color: var(--text);
        background: var(--bar-track);
        font: inherit;
        font-size: 12px;
        cursor: pointer;
      }

      button.primary {
        background: #7c3aed;
        color: #fff;
      }

      @keyframes indeterminate {
        0% { transform: translateX(-120%); }
        100% { transform: translateX(320%); }
      }
    </style>
  </head>
  <body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="content">
      <div class="icon-wrap">
        <img id="app-icon" src="logo-mark.svg" alt="" />
      </div>
      <h1>Focus Tracker</h1>
      <div id="message" class="subtitle">Проверяем обновления...</div>
      <div class="progress-area">
        <div id="bar" class="bar indeterminate">
          <div id="fill" class="fill"></div>
        </div>
        <div class="status">
          <span class="status-dot"></span>
          <span id="status-text">Загрузка компонентов</span>
        </div>
        <div id="actions" class="actions">
          <button id="retry" class="primary" type="button">Повторить</button>
          <button id="launch" type="button">Запустить текущую версию</button>
          <button id="openData" type="button">Открыть папку данных</button>
          <button id="close" type="button">Закрыть приложение</button>
        </div>
      </div>
    </div>

    <script>
      if (document.documentElement.classList.contains('light')) {
        document.getElementById('app-icon').src = 'logo-mark-light.svg';
      }
    </script>
    <script src="splash.js"></script>
  </body>
</html>
