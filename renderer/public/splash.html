<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Tracker</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #101113;
        color: #f5f7fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 10%, rgba(83, 114, 255, 0.22), transparent 34%),
          linear-gradient(135deg, #111318, #171a21 58%, #101113);
        overflow: hidden;
      }

      .shell {
        width: 100%;
        height: 100vh;
        padding: 28px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .logo {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: block;
        box-shadow: 0 18px 48px rgba(91, 124, 250, 0.28);
      }

      h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.2;
      }

      .subtitle {
        margin-top: 4px;
        color: #a6adbb;
        font-size: 12px;
      }

      .status {
        display: grid;
        gap: 12px;
      }

      .message {
        min-height: 38px;
        color: #d6dbea;
        font-size: 14px;
        line-height: 1.35;
      }

      .bar {
        width: 100%;
        height: 7px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
      }

      .fill {
        height: 100%;
        width: 12%;
        min-width: 12%;
        border-radius: inherit;
        background: linear-gradient(90deg, #7f96ff, #48d7b6);
        transition: width 180ms ease;
      }

      .bar.indeterminate .fill {
        width: 35%;
        min-width: 35%;
        animation: indeterminate 1.2s ease-in-out infinite;
      }

      .actions {
        display: none;
        gap: 8px;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 9px 12px;
        color: #f5f7fb;
        background: rgba(255, 255, 255, 0.12);
        font: inherit;
        font-size: 12px;
        cursor: pointer;
      }

      button.primary {
        background: #5b7cfa;
      }

      @keyframes indeterminate {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(320%);
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="brand">
        <img class="logo" src="logo-square-dark.svg" alt="" />
        <div>
          <h1>Focus Tracker</h1>
          <div class="subtitle">Готовим приложение к запуску</div>
        </div>
      </section>

      <section class="status">
        <div id="message" class="message">Запускаем...</div>
        <div id="bar" class="bar indeterminate">
          <div id="fill" class="fill"></div>
        </div>
        <div id="actions" class="actions">
          <button id="retry" class="primary" type="button">Повторить</button>
          <button id="launch" type="button">Запустить текущую версию</button>
          <button id="openData" type="button">Открыть папку данных</button>
          <button id="close" type="button">Закрыть приложение</button>
        </div>
      </section>
    </main>

    <script src="splash.js"></script>
  </body>
</html>
