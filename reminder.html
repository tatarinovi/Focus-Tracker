<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';">
  <title>Напоминание</title>
  <style>
    :root {
      --bg:          #111318;
      --surface:     #181b22;
      --border:      rgba(255,255,255,0.08);
      --accent:      #6366f1;
      --accent-lt:   #818cf8;
      --accent-glow: rgba(99,102,241,0.24);
      --text:        #f6f7fb;
      --text-2:      #a3a8b8;
      --text-3:      #697084;
      --red:         #F05252;
      --r:           12px;
      --shadow:      0 8px 32px rgba(0,0,0,0.55);
    }

    html.light {
      --bg:          #f8fafc;
      --surface:     #ffffff;
      --border:      rgba(15,23,42,0.10);
      --accent:      #6366f1;
      --accent-lt:   #6366f1;
      --accent-glow: rgba(99,102,241,0.16);
      --text:        #0f172a;
      --text-2:      #475569;
      --text-3:      #94a3b8;
      --red:         #DC2626;
      --shadow:      0 8px 32px rgba(0,0,0,0.12);
    }

    html.light body::before  { border-top-color: rgba(99,102,241,0.45); }
    html.light .drag         { border-bottom-color: rgba(0,0,0,0.07); }
    html.light .btn-ghost    { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.10); }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      user-select: none;
      border-radius: var(--r);
      clip-path: inset(0 round var(--r));
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      border-radius: var(--r);
      background: var(--bg);
      border: 1px solid var(--border);
      border-top-color: rgba(99,102,241,0.45);
      box-shadow: var(--shadow), 0 0 36px var(--accent-glow);
      z-index: -1;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .drag {
      height: 38px;
      padding: 0 12px;
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }

    .drag-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-3);
      letter-spacing: 0.04em;
    }

    .close-btn {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      color: var(--text-3);
      font-size: 12px;
      cursor: pointer;
      padding: 3px 6px;
      border-radius: 5px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
    }

    .close-btn:hover { color: var(--red); background: rgba(240,82,82,0.12); }

    .body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 14px 20px 10px;
      text-align: center;
    }

    .icon {
      font-size: 34px;
      margin-bottom: 6px;
      display: block;
      animation: ring 0.9s ease-in-out infinite;
    }

    @keyframes ring {
      0%, 100% { transform: rotate(0deg); }
      15% { transform: rotate(-18deg); }
      30% { transform: rotate(18deg); }
      45% { transform: rotate(-12deg); }
      60% { transform: rotate(12deg); }
      75% { transform: rotate(0deg); }
    }

    .title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }

    .event-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.35;
    }

    .event-time {
      font-size: 11px;
      color: var(--accent-lt);
      font-family: 'Consolas', 'Fira Mono', monospace;
    }

    .tracking-wrap {
      margin-top: 12px;
      width: 100%;
      display: none;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      text-align: left;
    }

    .tracking-wrap input {
      margin-top: 2px;
      accent-color: var(--accent);
      flex-shrink: 0;
    }

    .tracking-label {
      font-size: 11px;
      line-height: 1.35;
      color: var(--text-2);
    }

    .buttons {
      display: flex;
      gap: 8px;
      padding: 10px 16px 14px;
      width: 100%;
    }

    .btn {
      flex: 1;
      padding: 7px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: filter 0.15s;
    }

    .btn:hover { filter: brightness(1.12); }

    .btn-ghost {
      background: rgba(255,255,255,0.07);
      color: var(--text-2);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="drag">
    <span class="drag-label">Напоминание</span>
    <button class="close-btn" id="btn-close">×</button>
  </div>

  <div class="body">
    <span class="icon">📞</span>
    <div class="title">Созвон через 5 минут</div>
    <div class="event-name" id="event-name"></div>
    <div class="event-time" id="event-time"></div>
    <label class="tracking-wrap" id="tracking-wrap">
      <input type="checkbox" id="track-task" checked>
      <span class="tracking-label" id="track-task-label"></span>
    </label>
  </div>

  <div class="buttons">
    <button class="btn btn-ghost" id="btn-dismiss">Закрыть</button>
    <button class="btn btn-primary" id="btn-join" style="display:none">Подключиться</button>
  </div>

  <script src="reminder.js"></script>
</body>
</html>
