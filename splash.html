<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';">
  <title>Task Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-color:     #111318;
      --border-color: rgba(255,255,255,0.08);
      --border-top:   rgba(99,102,241,0.42);
      --text-color:   #f6f7fb;
      --text-dim:     rgba(246,247,251,0.54);
      --accent:       #6366f1;
      --accent-glow:  rgba(99,102,241,0.18);
      --bar-track:    rgba(255,255,255,0.07);
      --shadow:       rgba(0,0,0,0.7);
    }

    html.light {
      --bg-color:     #f8fafc;
      --border-color: rgba(15,23,42,0.10);
      --border-top:   rgba(99,102,241,0.45);
      --text-color:   #0f172a;
      --text-dim:     rgba(15,23,42,0.52);
      --accent:       #6366f1;
      --accent-glow:  rgba(99,102,241,0.14);
      --bar-track:    rgba(0,0,0,0.07);
      --shadow:       rgba(0,0,0,0.15);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg-color);
      user-select: none;
      border-radius: 12px;
      clip-path: inset(0 round 12px);
    }

    body::before {
      content: ''; position: fixed; inset: 0;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      border-top-color: var(--border-top);
      border-radius: 12px;
      box-shadow: 0 16px 44px var(--shadow), 0 0 32px var(--accent-glow);
    }

    .content {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 8px;
    }

    .icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      display: grid;
      place-items: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 18px;
      font-weight: 800;
      line-height: 1;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1;   transform: scale(1);    }
      50%       { opacity: 0.7; transform: scale(0.93); }
    }

    .name {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-color);
      letter-spacing: 0;
    }

    .bar-wrap {
      width: 100px;
      height: 2px;
      background: var(--bar-track);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 2px;
    }

    .bar {
      height: 100%;
      width: 45%;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 2px;
      animation: slide 1.1s ease-in-out infinite;
    }

    @keyframes slide {
      0%   { transform: translateX(-120%); }
      100% { transform: translateX(330%);  }
    }

    .status {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.03em;
      min-height: 14px;
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="icon">FT</div>
    <div class="name">Focus Tracker</div>
    <div class="bar-wrap"><div class="bar"></div></div>
    <div class="status" id="status"></div>
  </div>
  <script src="splash.js"></script>
</body>
</html>
